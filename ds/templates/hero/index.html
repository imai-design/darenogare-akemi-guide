<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ヒーロー</title><style>
:root{
  --ink:#1c1a17; --sub:#6b645c; --line:#e7e1d8; --bg:#faf7f2; --card:#ffffff;
  --accent:#b4472e; --accent-soft:#f4e7e1; --gold:#a4843f;
  --a:#2f7d57; --b:#9b7c2e; --c:#7a4b8f;
  --shadow:0 1px 2px rgba(28,26,23,.04),0 8px 30px rgba(28,26,23,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",-apple-system,sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.85;-webkit-font-smoothing:antialiased;
  font-feature-settings:"palt";padding:40px}
.serif{font-family:"Hiragino Mincho ProN","YuMincho",serif}
.mono{font-family:ui-monospace,Menlo,monospace}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}

.dskicker{font-size:11px;letter-spacing:.18em;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:14px}
.eyebrow{font-size:12px;letter-spacing:.22em;color:var(--accent);font-weight:700;text-transform:uppercase}.h1{font-size:44px;line-height:1.35;margin:16px 0 18px;font-weight:800}.lead{font-size:17px;color:var(--sub);max-width:660px}.badges{display:flex;gap:8px;margin-top:24px;flex-wrap:wrap}.b{font-size:12px;color:var(--sub);border:1px solid var(--line);background:var(--card);padding:5px 11px;border-radius:999px}.u{font-size:12px;color:var(--sub);margin-top:8px}</style></head><body>
<div class="dskicker">Template · Hero</div>
<div class="eyebrow">Fan Roadmap</div><div class="h1 serif">ダレノガレ明美さんに会うための<br>ファン・ロードマップ</div><div class="lead">公開されている情報だけで組み立てた、健全に「会いに行く」ための手引き。どこをフォローし、何を待ち、どう動けば本人と言葉を交わせるか — 現実度の高い順に。</div><div class="badges"><span class="b">公開情報のみで構成</span><span class="b">健全なファン活動の範囲</span><span class="b">2026年6月時点</span></div><div class="u">最終更新 2026-06-18</div>
</body></html>
