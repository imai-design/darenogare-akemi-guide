<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ファクトカード</title><style>
:root{
  --ink:#1c1a17; --sub:#6b645c; --line:#e7e1d8; --bg:#faf7f2; --card:#ffffff;
  --accent:#b4472e; --accent-soft:#f4e7e1; --gold:#a4843f;
  --a:#2f7d57; --b:#9b7c2e; --c:#7a4b8f;
  --shadow:0 1px 2px rgba(28,26,23,.04),0 8px 30px rgba(28,26,23,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",-apple-system,sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.85;-webkit-font-smoothing:antialiased;
  font-feature-settings:"palt";padding:40px}
.serif{font-family:"Hiragino Mincho ProN","YuMincho",serif}
.mono{font-family:ui-monospace,Menlo,monospace}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}

.dskicker{font-size:11px;letter-spacing:.18em;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.fact{padding:16px 18px}.lbl{font-size:11px;letter-spacing:.12em;color:var(--gold);font-weight:700;margin-bottom:6px}.val{font-size:14px}</style></head><body>
<div class="dskicker">Components · Fact Grid</div>
<div class="grid"><div class="fact card"><div class="lbl">事務所</div><div class="val">独立（株式会社QUEEN）＋TRUSTAR業務提携</div></div><div class="fact card"><div class="lbl">活動の軸</div><div class="val">実業（美容ブランド CAROME.）中心</div></div><div class="fact card"><div class="lbl">ファンクラブ</div><div class="val">専用FC・公式サイン会は現状なし</div></div><div class="fact card"><div class="lbl">SNS</div><div class="val">Instagram約100万・X約170万。本人発信の主軸はIG</div></div></div>
</body></html>
