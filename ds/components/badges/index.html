<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>バッジ & 確度ピル</title><style>
:root{
  --ink:#1c1a17; --sub:#6b645c; --line:#e7e1d8; --bg:#faf7f2; --card:#ffffff;
  --accent:#b4472e; --accent-soft:#f4e7e1; --gold:#a4843f;
  --a:#2f7d57; --b:#9b7c2e; --c:#7a4b8f;
  --shadow:0 1px 2px rgba(28,26,23,.04),0 8px 30px rgba(28,26,23,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",-apple-system,sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.85;-webkit-font-smoothing:antialiased;
  font-feature-settings:"palt";padding:40px}
.serif{font-family:"Hiragino Mincho ProN","YuMincho",serif}
.mono{font-family:ui-monospace,Menlo,monospace}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}

.dskicker{font-size:11px;letter-spacing:.18em;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:14px}
.b{font-size:12px;color:var(--sub);border:1px solid var(--line);background:var(--card);padding:5px 11px;border-radius:999px;margin:0 8px 8px 0;display:inline-block}.pill{font-size:11px;font-weight:700;letter-spacing:.04em;padding:3px 11px;border-radius:999px;margin:0 8px 8px 0;display:inline-block}.p-h{background:#e6f3ec;color:#2f7d57}.p-m{background:#f6efda;color:#9b7c2e}.p-l{background:#f3e9ef;color:#7a4b8f}.p-u{background:#eee;color:#777}.lbl{font-size:12px;color:var(--gold);font-weight:700;margin:14px 0 8px}</style></head><body>
<div class="dskicker">Components · Badges</div>
<div class="lbl">注記バッジ</div><span class="b">公開情報のみで構成</span><span class="b">健全なファン活動の範囲</span><span class="b">2026年6月時点</span><div class="lbl">確度ピル</div><span class="pill p-h">確度：高</span><span class="pill p-m">確度：中</span><span class="pill p-l">確度：低</span><span class="pill p-u">確度：不明</span>
</body></html>
