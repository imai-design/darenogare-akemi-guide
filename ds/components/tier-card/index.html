<!-- @dsCard group="Components" name="Tierカード" subtitle="3段ロケットの段カード" viewport="880x560" -->
<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tierカード</title><style>
:root{
  --ink:#1c1a17; --sub:#6b645c; --line:#e7e1d8; --bg:#faf7f2; --card:#ffffff;
  --accent:#b4472e; --accent-soft:#f4e7e1; --gold:#a4843f;
  --a:#2f7d57; --b:#9b7c2e; --c:#7a4b8f;
  --shadow:0 1px 2px rgba(28,26,23,.04),0 8px 30px rgba(28,26,23,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",-apple-system,sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.85;-webkit-font-smoothing:antialiased;
  font-feature-settings:"palt";padding:40px}
.serif{font-family:"Hiragino Mincho ProN","YuMincho",serif}
.mono{font-family:ui-monospace,Menlo,monospace}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}

.dskicker{font-size:11px;letter-spacing:.18em;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:14px}
.tier{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);max-width:760px}.tier-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:flex-start}.tier-tag{flex:none;width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-weight:800;font-size:20px;color:#fff;font-family:ui-monospace,Menlo,monospace;background:var(--a)}.t{font-size:18px;font-weight:800}.r{font-size:13px;color:var(--sub);margin-top:3px}.step{padding:18px 24px}.sa{font-weight:700;font-size:15px;margin-bottom:6px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}.pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;background:#f6efda;color:#9b7c2e}.how{font-size:14px;color:#3c3833;margin-bottom:8px}.meta{font-size:12.5px;color:var(--sub);display:flex;gap:6px 18px;flex-wrap:wrap}.note{font-size:12.5px;color:var(--sub);margin-top:8px;padding:8px 12px;background:var(--bg);border-radius:8px}</style></head><body>
<div class="dskicker">Components · Tier Card</div>
<div class="tier"><div class="tier-head"><div class="tier-tag">A</div><div><div class="t">今すぐ・無料で「言葉を交わす」</div><div class="r">いちばん早く、誰でも、会話できる確度が高い入口。</div></div></div><div class="step"><div class="sa">公式インスタライブにコメント参加 <span class="pill">確度：中</span></div><div class="how">フォロー＆ライブ通知ON。配信開始直後に短く読みやすいコメントを送る。</div><div class="meta"><span>費用：<b>無料</b></span><span>場所：<b>オンライン</b></span><span>頻度：<b>突発・不定期</b></span></div><div class="note">コツ：長文・連投・しつこいDMは逆効果。短く・好意的に・たまに。</div></div></div>
</body></html>
